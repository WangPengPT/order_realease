    <script>
      // Remove loading class once React mounts
      window.addEventListener('DOMContentLoaded', function() {
        var startTime = Date.now();
        var checkReactMounted = setInterval(function() {
          var root = document.getElementById('root');
          if (root && root.children.length > 1) {
            document.body.classList.remove('app-loading');
            var loader = document.getElementById('initial-loader');
            if (loader) {
              loader.classList.add('fade-out');
              setTimeout(function() {
                if (loader.parentNode) {
                  loader.parentNode.removeChild(loader);
                }
              }, 300);
            }
            clearInterval(checkReactMounted);
          }
          if (Date.now() - startTime > 5000) {
            var loaderText = document.getElementById('initial-loader-text');
            if (loaderText) {
              loaderText.textContent = 'Loading slowly... Please wait or refresh';
            }
          }
        }, 50);
        // Fallback: if React never mounts after 12s, show error instead of white screen
        setTimeout(function() {
          clearInterval(checkReactMounted);
          var root = document.getElementById('root');
          var loader = document.getElementById('initial-loader');
          // Check if React actually mounted
          if (root && root.children.length <= 1) {
            // React never mounted - show fallback UI
            if (loader && loader.parentNode) {
              loader.parentNode.removeChild(loader);
            }
            document.body.classList.remove('app-loading');
            root.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:-apple-system,BlinkMacSystemFont,sans-serif;padding:20px;text-align:center;background:#f9fafb">' +

              '</div></div>';
          } else {
            // React mounted fine, just clean up loader
            document.body.classList.remove('app-loading');
            if (loader && loader.parentNode) {
              loader.parentNode.removeChild(loader);
            }
          }
        }, 12000);
      });
      
      // Catch global errors during loading
      window.onerror = function(msg, url, lineNo, columnNo, error) {

        // Show error UI instead of white screen

            '</div></div>';
        }

      };
